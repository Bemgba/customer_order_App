{% extends 'accounts/dashboard1_base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card card-body shadow">
                <div class="mb-4">
                    <i class="icon icon-question-circle" style="font-size: 80px; color: #ffc107;"></i>
                </div>
                <h1 class="display-4 text-warning">404</h1>
                <h3 class="mb-3">Page Not Found</h3>
                <p class="lead text-muted mb-4">
                    The page you're looking for doesn't exist or has been moved.
                </p>
                <div class="alert alert-info">
                    <i class="icon icon-info-circle"></i>
                    The URL you entered might be incorrect, or the page may have been removed.
                </div>
                <div class="mt-4">
                    <a href="{% url 'home' %}" class="btn btn-primary">
                        <i class="icon icon-home"></i> Go to Dashboard
                    </a>
                    <a href="javascript:history.back()" class="btn btn-secondary">
                        <i class="icon icon-arrow-left"></i> Go Back
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
