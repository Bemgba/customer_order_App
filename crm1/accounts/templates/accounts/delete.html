{% extends 'accounts/dashboard1_base.html' %}
{% load static %}

{% block content %}
<br />
<div class="row">
    <div class="col-md-4"></div>
    <div class="col-md-4">
        <div class="card card-body">
            <h5 class="text-danger">Confirm Deletion</h5>
            <hr>
            <p>Are you sure you want to delete: <strong>{{ item }}</strong>?</p>
            <form method="POST">
                {% csrf_token %}
                <a class="btn btn-warning" href="{% url 'home' %}">Cancel</a>
                <input class="btn btn-danger" type="submit" value="Confirm Delete" />
            </form>
        </div>
    </div>
    <div class="col-md-4"></div>
</div>
