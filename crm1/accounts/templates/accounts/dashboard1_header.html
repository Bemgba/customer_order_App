{% load static %}
<div class="flex items-center gap-3 ml-auto">

  <!-- Notification bell -->
  <a href="{% url 'notifications' %}" class="relative p-2 rounded-lg text-ink-500 hover:bg-ink-100 transition-colors">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
      <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"/>
    </svg>
    {% if unread_notifications > 0 %}
    <span class="absolute -top-0.5 -right-0.5 w-4 h-4 rounded-full bg-blossom-500 text-white text-xs flex items-center justify-center font-bold leading-none">{{ unread_notifications }}</span>
    {% endif %}
  </a>

  <!-- User dropdown -->
  <div class="dropdown dropdown-end">
    <label tabindex="0" class="flex items-center gap-2 cursor-pointer hover:bg-ink-100 rounded-xl px-3 py-1.5 transition-colors">
      <div class="w-8 h-8 rounded-full bg-brand-600 flex items-center justify-center text-white font-bold text-sm shrink-0">
        {{ request.user.username|first|upper }}
      </div>
      <span class="hidden sm:block text-sm font-semibold text-ink-700">{{ request.user.username }}</span>
      <svg class="w-4 h-4 text-ink-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
    </label>
    <ul tabindex="0" class="dropdown-content menu bg-white rounded-2xl shadow-pop border border-ink-100 w-48 mt-2 p-1.5 z-50 text-sm">
      <li><a href="{% url 'profile' %}" class="rounded-xl text-ink-700 hover:bg-brand-50 hover:text-brand-800 font-medium">Profile</a></li>
      {% if user_profile.is_ceo or request.user.is_superuser %}
      <li><a href="{% url 'user_list' %}" class="rounded-xl text-ink-700 hover:bg-brand-50 hover:text-brand-800 font-medium">Users</a></li>
      <li><a href="{% url 'role_list' %}" class="rounded-xl text-ink-700 hover:bg-brand-50 hover:text-brand-800 font-medium">Roles</a></li>
      {% endif %}
      <li class="border-t border-ink-100 mt-1 pt-1">
        <a href="{% url 'logout' %}" class="rounded-xl text-blossom-600 hover:bg-blossom-50 font-medium">Logout</a>
      </li>
    </ul>
  </div>
</div>
